<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0A0A0A 0%, #1a1a2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', Arial, sans-serif;
    }
    .container {
      text-align: center;
    }
    .logo {
      font-size: 72px;
      font-weight: 900;
      background: linear-gradient(90deg, #007BFF, #00D4FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .au {
      font-size: 36px;
      font-weight: 700;
      color: #007BFF;
    }
    .tagline {
      font-size: 28px;
      color: #F0F0F0;
      margin-top: 20px;
      font-weight: 600;
    }
    .subtitle {
      font-size: 20px;
      color: #999;
      margin-top: 10px;
    }
    .cryptos {
      margin-top: 30px;
      font-size: 24px;
      color: #F0F0F0;
      letter-spacing: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div>
      <span class="logo">CRYPTOELECTRO</span><span class="au">.au</span>
    </div>
    <p class="tagline">Premium Electronics Marketplace</p>
    <p class="subtitle">Shop with Bitcoin, Ethereum, USDT & 100+ Cryptocurrencies</p>
    <p class="cryptos">₿ Ξ ₮ ◎ 🔷</p>
  </div>
</body>
</html>
